name: CLI CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Compile
        run: python -m py_compile tarka_cli/config.py tarka_cli/main.py
      - name: Test
        run: python -m pytest
      - name: CLI help
        run: |
          tarka --help
          tarka training --help
